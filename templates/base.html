<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexora POS</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
        }

        .navbar {
            background: #111827;
            padding: 15px 20px;
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        .container {
            max-width: 1100px;
            margin: 30px auto;
            background: #1e293b;
            padding: 20px;
            border-radius: 14px;
            box-shadow: 0 0 20px rgba(0,0,0,0.25);
        }

        h1, h2, h3 {
            margin-top: 0;
        }

        input, button {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            margin-bottom: 16px;
            border-radius: 10px;
            border: none;
            font-size: 15px;
            box-sizing: border-box;
        }

        input {
            background: #f8fafc;
            color: #111827;
        }

        button {
            background: #2563eb;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #1d4ed8;
        }

        .btn {
            display: inline-block;
            padding: 10px 14px;
            border-radius: 10px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }

        .btn-green {
            background: #16a34a;
        }

        .btn-yellow {
            background: #ca8a04;
        }

        .btn-red {
            background: #dc2626;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            color: black;
            border-radius: 10px;
            overflow: hidden;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            text-align: left;
            vertical-align: middle;
        }

        th {
            background: #e5e7eb;
        }

        .flash {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .success {
            background: #16a34a;
            color: white;
        }

        .danger {
            background: #dc2626;
            color: white;
        }

        .top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .search-box {
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 450px;
            flex-wrap: wrap;
        }

        .search-box input {
            margin: 0;
            flex: 1;
        }

        .search-box button {
            width: auto;
            margin: 0;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .card {
            background: #334155;
            padding: 20px;
            border-radius: 14px;
        }

        .inline-form {
            display: inline;
        }

        .actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        label {
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <a href="{{ url_for('dashboard') }}">Dashboard</a>
        <a href="{{ url_for('products') }}">Products</a>
        <a href="{{ url_for('add_product') }}">Add Product</a>
    </div>

    <div class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>

</body>
</html>
