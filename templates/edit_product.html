<h1>Edit Product</h1>
<form method="POST">
  Name: <input name="product_name" value="{{ product.product_name }}"><br>
  Price: <input name="retail_price" value="{{ product.retail_price }}"><br>
  Stock: <input name="stock" value="{{ product.stock }}"><br>
  <button type="submit">Update</button>
</form>
