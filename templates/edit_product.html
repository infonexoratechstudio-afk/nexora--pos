{% extends "base.html" %}

{% block content %}
<h1>Edit Product</h1>

<form method="POST" action="{{ url_for('edit_product', product_id=product.id) }}">
    <label>Product Code</label>
    <input type="text" value="{{ product.product_code }}" readonly>

    <label>Product Name</label>
    <input type="text" name="name" value="{{ product.name }}" required>

    <label>Category</label>
    <input type="text" name="category" value="{{ product.category }}" required>

    <label>Company</label>
    <input type="text" name="company" value="{{ product.company }}" required>

    <label>Net Weight</label>
    <input type="text" name="net_weight" value="{{ product.net_weight }}">

    <label>Buy Price</label>
    <input type="number" step="0.01" name="buy_price" value="{{ product.buy_price }}" required>

    <label>Sell Price</label>
    <input type="number" step="0.01" name="sell_price" value="{{ product.sell_price }}" required>

    <label>Stock</label>
    <input type="number" name="stock" value="{{ product.stock }}" required>

    <button type="submit">Update Product</button>
</form>
{% endblock %}
